<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="100%">
  <defs>
    <!-- Colorful gradient for the border -->
    <linearGradient id="quoteBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#bc8cff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <!-- Glowing Drop Shadow Filter -->
    <filter id="neonShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00f2fe" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .quote-box {
      fill: #050814;
      stroke: url(#quoteBorder);
      stroke-width: 1.5;
      rx: 12px;
      filter: url(#neonShadow);
    }
    .quote-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 18px;
      fill: #e2e8f0;
      text-anchor: middle;
      font-style: italic;
    }
    .quote-author {
      font-family: "Fira Code", monospace;
      font-size: 14px;
      fill: #5af78e;
      font-style: normal;
      font-weight: bold;
    }
  </style>

  <!-- Card background with glow -->
  <rect class="quote-box" x="20" y="20" width="760" height="80" />

  <!-- Centered Text -->
  <text x="400" y="66" class="quote-text">
    "First, solve the problem. Then, write the code."
    <tspan class="quote-author"> &mdash; John Johnson</tspan>
  </text>
</svg>
