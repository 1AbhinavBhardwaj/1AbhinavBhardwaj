<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <!-- SVG filters for glowing effects -->
  <defs>
    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#9b51e0" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .terminal-bg { fill: #050814; stroke: url(#cardBorder); stroke-width: 1.5; rx: 12px; }
    .window-header { fill: #586e75; font-family: monospace; font-size: 13px; }
    .code { font-family: "Fira Code", Menlo, Monaco, Consolas, monospace; font-size: 19px; font-weight: 500; }
    .kw { fill: #ff79c6; }
    .str { fill: #a5d6ff; }
    .name-val { fill: #00f2fe; font-weight: 900; font-size: 26px; filter: url(#glow); }
    .prop { fill: #f8f8f2; }
    .symbol { fill: #f8f8f2; }
  </style>

  <!-- Terminal window container -->
  <rect class="terminal-bg" x="20" y="20" width="960" height="280" />

  <!-- Window controls -->
  <circle cx="50" cy="45" r="6" fill="#ff5f56" />
  <circle cx="70" cy="45" r="6" fill="#ffbd2e" />
  <circle cx="90" cy="45" r="6" fill="#27c93f" />

  <!-- Terminal header text -->
  <text x="500" y="49" class="window-header" text-anchor="middle">developer.js</text>

  <!-- Divider line -->
  <line x1="20" y1="65" x2="980" y2="65" stroke="#1f242c" stroke-width="1" />

  <!-- Code Block (Left Side) -->
  <g transform="translate(60, 65)">
    <text class="code" fill="#f8f8f2">
      <tspan x="0" y="55"><tspan class="kw">const</tspan> developer <tspan class="symbol">=</tspan> {</tspan>
      <tspan x="25" dy="32"><tspan class="prop">name</tspan><tspan class="symbol">:</tspan> <tspan class="name-val">"Abhinav Bhardwaj"</tspan><tspan class="symbol">,</tspan></tspan>
      <tspan x="25" dy="32"><tspan class="prop">role</tspan><tspan class="symbol">:</tspan> <tspan class="str">"Full Stack Developer"</tspan><tspan class="symbol">,</tspan></tspan>
      <tspan x="25" dy="32"><tspan class="prop">stack</tspan><tspan class="symbol">:</tspan> <tspan class="symbol">[</tspan><tspan class="str">"Java"</tspan><tspan class="symbol">,</tspan> <tspan class="str">"React"</tspan><tspan class="symbol">,</tspan> <tspan class="str">"MVC"</tspan><tspan class="symbol">]</tspan></tspan>
      <tspan x="0" dy="32"><tspan class="symbol">};</tspan></tspan>
    </text>
  </g>

  <!-- Data Flow Tree Animation (Right Side) -->
  <g transform="translate(820, 160)">
    <!-- Static tree links (branches) -->
    <path d="M 0 -70 L -50 0 M 0 -70 L 50 0" stroke="#1f242c" stroke-width="2.5" />
    <path d="M -50 0 L -80 70 M -50 0 L -20 70" stroke="#1f242c" stroke-width="1.8" />
    <path d="M 50 0 L 20 70 M 50 0 L 80 70" stroke="#1f242c" stroke-width="1.8" />

    <!-- Flowing data packets (animated circles moving along paths) -->
    <!-- Level 1: Root to Children -->
    <circle r="4" fill="#00f2fe" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="indefinite" path="M 0 -70 L -50 0" />
    </circle>
    <circle r="4" fill="#00f2fe" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="indefinite" path="M 0 -70 L 50 0" />
    </circle>

    <!-- Level 2: Children to Leaves (triggered at 1s delay) -->
    <circle r="3.5" fill="#5af78e" filter="url(#glow)">
      <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M -50 0 L -80 70" />
    </circle>
    <circle r="3.5" fill="#5af78e" filter="url(#glow)">
      <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M -50 0 L -20 70" />
    </circle>
    <circle r="3.5" fill="#5af78e" filter="url(#glow)">
      <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M 50 0 L 20 70" />
    </circle>
    <circle r="3.5" fill="#5af78e" filter="url(#glow)">
      <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M 50 0 L 80 70" />
    </circle>

    <!-- Static Nodes -->
    <!-- Root Node -->
    <circle cx="0" cy="-70" r="8" fill="#00f2fe" filter="url(#glow)" />
    <!-- Intermediate Child Nodes -->
    <circle cx="-50" cy="0" r="6" fill="#bc8cff" />
    <circle cx="50" cy="0" r="6" fill="#bc8cff" />
    <!-- Leaf Nodes -->
    <circle cx="-80" cy="70" r="5" fill="#5af78e" />
    <circle cx="-20" cy="70" r="5" fill="#5af78e" />
    <circle cx="20" cy="70" r="5" fill="#5af78e" />
    <circle cx="80" cy="70" r="5" fill="#5af78e" />

    <!-- UI Crosshair details -->
    <line x1="-95" y1="0" x2="-85" y2="0" stroke="#586e75" stroke-width="1" opacity="0.4" />
    <line x1="85" y1="0" x2="95" y2="0" stroke="#586e75" stroke-width="1" opacity="0.4" />

    <!-- Status indicator if i am active -->
    <text x="0" y="98" font-family="monospace" font-size="10" font-weight="bold" fill="#5af78e" letter-spacing="2" text-anchor="middle" opacity="0.8">DATA_FLOW_ACTIVE</text>
  </g>
</svg>
